<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Wallet Flow</title>
<style>
  :root {
    --primary: #007aff;
    --bg: #f2f2f7;
    --card-bg: #ffffff;
    --text-main: #1c1c1e;
    --text-sub: #8e8e93;
    --accent: #ff9500;
    --danger: #ff3b30;
    --shadow: 0 4px 20px rgba(0,0,0,0.05);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Hiragino Sans", sans-serif;
    background: var(--bg); color: var(--text-main);
    line-height: 1.5;
  }

  .container { max-width: 500px; margin: 0 auto; padding: 20px 16px 100px; }

  /* Header Design */
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .month-nav {
    display: flex; align-items: center; background: #e5e5ea;
    padding: 4px; border-radius: 20px;
  }
  .month-nav button {
    background: none; border: none; width: 32px; height: 32px;
    font-size: 14px; cursor: pointer; color: var(--text-main);
  }
  #month-label { font-size: 14px; font-weight: 600; padding: 0 12px; }

  /* Summary Section - 文字を左揃えに変更 */
  .summary {
    display: grid; grid-template-columns: 1.5fr 1fr; gap: 12px;
    margin-bottom: 30px;
  }
  .card {
    background: var(--card-bg); padding: 18px; border-radius: 20px;
    box-shadow: var(--shadow); position: relative; overflow: hidden;
    text-align: left; /* 左揃え */
  }
  .card::after {
    content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
    background: linear-gradient(90deg, var(--primary), #5856d6);
  }
  .card-label { font-size: 11px; color: var(--text-sub); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .card-value { font-size: 22px; font-weight: 800; margin-top: 4px; color: var(--primary); }
  .card.sub { background: rgba(255,255,255,0.7); }
  .card.sub .card-value { color: var(--text-main); font-size: 18px; }

  /* Transaction List */
  .day-group { margin-top: 28px; }
  .day-label {
    font-size: 13px; font-weight: 700; color: var(--text-sub);
    margin-bottom: 10px; padding-left: 4px;
    display: flex; align-items: center;
    text-align: left; /* 左揃え */
  }
  .day-label::after {
    content: ''; flex: 1; height: 1px; background: #d1d1d6; margin-left: 12px;
  }

  .tx-row {
    display: grid; grid-template-columns: 1fr auto auto;
    gap: 12px; align-items: center;
    background: var(--card-bg); padding: 14px 16px;
    border-radius: 16px; margin-bottom: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    transition: transform 0.2s;
    text-align: left; /* 左揃え */
  }
  .tx-row:active { transform: scale(0.98); }
  .tx-row.manual { border-left: 4px solid var(--accent); }

  .tx-info { display: flex; flex-direction: column; }
  .tx-store { font-size: 15px; font-weight: 600; color: #3a3a3c; }
  .tx-cat {
    font-size: 10px; font-weight: 700; color: var(--text-sub);
    background: #f2f2f7; padding: 2px 8px; border-radius: 6px;
    width: fit-content; margin-top: 4px;
  }
  .tx-amount { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; text-align: right; }

  .tx-delete {
    color: #c7c7cc; background: none; border: none; font-size: 20px;
    padding: 4px; cursor: pointer; transition: color 0.2s;
  }
  .tx-delete:hover { color: var(--danger); }

  /* FAB */
  .fab {
    position: fixed; bottom: 30px; right: 24px;
    width: 60px; height: 60px; border-radius: 30px;
    background: linear-gradient(135deg, var(--primary), #5856d6);
    color: white; font-size: 30px; border: none;
    box-shadow: 0 8px 24px rgba(0,122,255,0.3);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }

  /* Modal Design */
  dialog {
    width: 90%; max-width: 400px; border: none; border-radius: 24px;
    padding: 24px; margin: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    text-align: left; /* モーダル内も左揃え */
  }
  dialog::backdrop { background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); }
  dialog h2 { font-size: 18px; font-weight: 800; margin-bottom: 20px; }
  
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text-sub); margin-bottom: 6px; }
  input, select {
    width: 100%; padding: 12px 16px; border: 1px solid #e5e5ea;
    border-radius: 12px; font-size: 16px; background: #f9f9f9;
    appearance: none; -webkit-appearance: none;
  }
  input:focus { outline: 2px solid var(--primary); background: white; }

  .btn-group { display: flex; gap: 12px; margin-top: 24px; }
  .btn-group button {
    flex: 1; padding: 14px; border-radius: 14px; font-weight: 700; font-size: 15px; border: none;
  }
  #submit-btn { background: var(--primary); color: white; }
  #cancel-btn { background: #f2f2f7; color: var(--text-main); }

  .loading, .empty { text-align: center; padding: 60px 0; color: var(--text-sub); font-weight: 500; }
  
  .toast {
    position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.8); color: white; padding: 12px 24px;
    border-radius: 30px; font-size: 13px; font-weight: 600;
    opacity: 0; transition: 0.3s; z-index: 200; pointer-events: none;
  }
  .toast.show { opacity: 1; bottom: 100px; }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Wallet Flow</h1>
    <div class="month-nav">
      <button id="prev">◀</button>
      <span id="month-label">-</span>
      <button id="next">▶</button>
    </div>
  </header>

  <div class="summary">
    <div class="card">
      <div class="card-label">Expenses</div>
      <div class="card-value" id="total">¥0</div>
    </div>
    <div class="card sub">
      <div class="card-label">Count</div>
      <div class="card-value" id="count">0</div>
    </div>
  </div>

  <div id="list" class="loading">Loading...</div>
</div>

<button id="fab" class="fab">＋</button>

<dialog id="modal">
  <h2>New Entry</h2>
  <form id="tx-form">
    <div class="form-group">
      <label>DATE</label>
      <input type="date" name="date" required>
    </div>
    <div class="form-group">
      <label>STORE</label>
      <input type="text" name="store" required placeholder="Where did you spend?">
    </div>
    <div class="form-group">
      <label>AMOUNT</label>
      <input type="number" name="amount" required placeholder="0" inputmode="numeric">
    </div>
    <div class="form-group">
      <label>CATEGORY</label>
      <select name="category"></select>
    </div>
    <div class="btn-group">
      <button type="button" id="cancel-btn">Cancel</button>
      <button type="submit" id="submit-btn">Add Record</button>
    </div>
  </form>
</dialog>

<div id="toast" class="toast"></div>

<script>
  // API設定（あなたのURLに書き換えてください）
  const API_URL = 'https://script.google.com/macros/s/AKfycbzAgdVSR__OuxoByJs6yx1btkHLokAYKGCS_ezxLCFLjeUFRbD1rurj_0-tZO153M34/exec';

  const CATEGORIES = ["食費","交通費","外食","日用品","娯楽","医療","通信費","光熱費","Amazon","衣類","その他"];
  const CATEGORY_RULES = [
    ['食費', ['スーパー','マルエツ','イオン','西友','コープ','ライフ','セブン','ファミマ','ローソン']],
    ['外食', ['レストラン','カフェ','スタバ','マック','吉野家','すき家','サイゼリヤ']],
    ['交通費', ['JR','Suica','PASMO','東京メトロ','タクシー','バス']],
    ['娯楽', ['Netflix','Spotify','映画','ゲーム','DMM']],
    ['Amazon', ['Amazon','アマゾン']],
  ];

  const state = { month: new Date().toISOString().slice(0, 7) };

  function yen(n) { return '¥' + Number(n).toLocaleString(); }
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
  }

  async function load() {
    const listEl = document.getElementById('list');
    document.getElementById('month-label').textContent = state.month.replace('-', ' / ');
    listEl.innerHTML = '<div class="loading">Fetching data...</div>';
    try {
      const res = await fetch(`${API_URL}?month=${state.month}`);
      const data = await res.json();
      render(data.transactions);
    } catch (err) {
      listEl.textContent = 'Error: ' + err.message;
    }
  }

  function render(txs) {
    const total = txs.reduce((sum, t) => sum + Number(t.amount), 0);
    document.getElementById('total').textContent = yen(total);
    document.getElementById('count').textContent = txs.length;

    const listEl = document.getElementById('list');
    if (txs.length === 0) {
      listEl.innerHTML = '<div class="empty">No records found</div>';
      return;
    }

    const groups = {};
    txs.forEach(t => (groups[t.date] ||= []).push(t));
    const dates = Object.keys(groups).sort().reverse();

    listEl.innerHTML = dates.map(date => `
      <div class="day-group">
        <div class="day-label">${date}</div>
        ${groups[date].map(t => {
          const isManual = t.source === 'manual';
          return `
            <div class="tx-row ${isManual ? 'manual' : ''}">
              <div class="tx-info">
                <span class="tx-store">${escapeHtml(t.store)}</span>
                <span class="tx-cat">${escapeHtml(t.category)}</span>
              </div>
              <div class="tx-amount">${yen(t.amount)}</div>
              ${isManual 
                ? `<button class="tx-delete" data-id="${escapeHtml(t.message_id)}">×</button>` 
                : '<div style="width:28px"></div>'}
            </div>
          `;
        }).join('')}
      </div>
    `).join('');
  }

  function guessCategory(store) {
    for (const [cat, kws] of CATEGORY_RULES) {
      if (kws.some(kw => store.includes(kw))) return cat;
    }
    return 'その他';
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

// --- 月移動の修正版 ---
  document.getElementById('prev').addEventListener('click', () => {
    const [y, m] = state.month.split('-').map(Number);
    // 1ヶ月前を計算（Dateオブジェクトに任せるのが一番安全）
    const d = new Date(y, m - 2, 1); 
    state.month = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    load();
  });

  document.getElementById('next').addEventListener('click', () => {
    const [y, m] = state.month.split('-').map(Number);
    // 1ヶ月後を計算
    const d = new Date(y, m, 1); 
    state.month = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    load();
  });

  document.getElementById('fab').addEventListener('click', () => {
    document.querySelector('input[name="date"]').value = new Date().toISOString().slice(0, 10);
    document.getElementById('modal').showModal();
  });
  document.getElementById('cancel-btn').addEventListener('click', () => document.getElementById('modal').close());

  document.getElementById('tx-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = 'Adding...';
    
    const fd = new FormData(e.target);
    const payload = {
      action: 'add',
      date: fd.get('date'),
      store: fd.get('store').trim(),
      amount: Number(fd.get('amount')),
      category: fd.get('category')
    };

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify(payload)
      });
      const resData = await res.json();
      if (!resData.ok) throw new Error();
      document.getElementById('modal').close();
      e.target.reset();
      toast('Success!');
      load();
    } catch {
      toast('Failed to add');
    } finally {
      btn.disabled = false; btn.textContent = 'Add Record';
    }
  });

  document.addEventListener('click', async (e) => {
    if (!e.target.classList.contains('tx-delete')) return;
    if (!confirm('Delete this record?')) return;
    const id = e.target.dataset.id;
    try {
      await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', message_id: id }) });
      toast('Deleted');
      load();
    } catch {
      toast('Error');
    }
  });

  document.querySelector('input[name="store"]').addEventListener('input', (e) => {
    document.querySelector('select[name="category"]').value = guessCategory(e.target.value);
  });

  document.querySelector('select[name="category"]').innerHTML = CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join('');
  load();
</script>
</body>
</html>
